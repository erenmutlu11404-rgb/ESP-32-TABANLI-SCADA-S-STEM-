{% extends 'base.html' %}

{% block content %}
<h3 class="fw-bold mb-4" style="color: #333;">CİHAZ LİSTESİ</h3>

<div class="row">
    {% for cihaz in cihazlar %}
    <div class="col-md-3 mb-4">
        <div class="card card-custom p-3 cursor-pointer" onclick="window.location.href='{{ url_for('cihaz_detay', ip=cihaz.ip, port=cihaz.port) }}'" style="cursor: pointer;">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h5 class="mb-0 fw-bold">{{ cihaz.isim }}</h5>
                    <small class="text-muted">{{ cihaz.ip }} : {{ cihaz.port }}</small>
                </div>
                <div>
                    {% if session.get('rol') == 'admin' %}
                    <a href="{{ url_for('cihaz_sil', ip=cihaz.ip, port=cihaz.port) }}" class="text-danger fw-bold text-decoration-none" style="font-size: 1.2rem;" onclick="event.stopPropagation(); return confirm('Cihaz silinsin mi?');">X</a>
                    {% endif %}
                </div>
            </div>
            
            <div class="mt-4 d-flex align-items-center">
                <div id="led-{{ loop.index }}" style="width: 12px; height: 12px; border-radius: 50%; background-color: gray; margin-right: 8px;"></div>
                <span id="status-{{ loop.index }}" class="text-muted" style="font-size: 0.85rem; font-weight: bold;">Kontrol ediliyor...</span>
                
                <button class="btn btn-sm btn-link ms-auto text-decoration-none p-0" style="color: #007ACC; font-size: 1.1rem; font-weight:bold;" onclick="event.stopPropagation(); pingAt('{{ cihaz.ip }}', {{ loop.index }});">↻</button>
            </div>
        </div>
    </div>

    <script>
        function pingAt(ip, index) {
            const led = document.getElementById("led-" + index);
            const statusText = document.getElementById("status-" + index);
            
            led.style.backgroundColor = "gray";
            statusText.innerText = "...";
            statusText.style.color = "gray";

            fetch(`/api/ping/${ip}`)
                .then(response => response.json())
                .then(data => {
                    if (data.bagli) {
                        led.style.backgroundColor = "#2ECC71"; 
                        statusText.innerText = "BAĞLI";
                        statusText.style.color = "#2ECC71";
                    } else {
                        led.style.backgroundColor = "#E74C3C"; 
                        statusText.innerText = "ULAŞILAMIYOR";
                        statusText.style.color = "#E74C3C";
                    }
                });
        }
        
        // Sayfa yüklenince otomatik ping at
        document.addEventListener("DOMContentLoaded", () => {
            pingAt('{{ cihaz.ip }}', {{ loop.index }});
        });
    </script>
    {% else %}
        <p class="text-muted fs-5 mt-4">Kayıtlı cihaz yok</p>
    {% endfor %}
</div>
{% endblock %}
