{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card card-custom p-4 shadow" style="width: 450px; border-radius: 10px;">
        <h4 class="text-center mb-4 fw-bold" style="color: #2C3E50;">TCP/IP CİHAZ EKLE</h4>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold" style="color: #555;">Cihaz Adı</label>
                <input type="text" name="isim" class="form-control bg-dark text-white border-secondary" placeholder="Örn: İstasyon 1" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold" style="color: #555;">Cihaz IP Adresi</label>
                <input type="text" name="ip_adresi" class="form-control bg-dark text-white border-secondary" placeholder="Örn: 192.168.1.10" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold" style="color: #555;">TCP Portu</label>
                <input type="number" name="tcp_port" class="form-control bg-dark text-white border-secondary" placeholder="Örn: 502" value="502" required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('index') }}" class="btn btn-danger fw-bold px-4">İPTAL</a>
                <button type="submit" class="btn btn-success fw-bold px-4" style="background-color: #27AE60; border: none;">CİHAZI EKLE</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
